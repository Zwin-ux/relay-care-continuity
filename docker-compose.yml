services:
  api:
    build: ./apps/api
    environment:
      MODEL_MODE: replay
      AGENT_PROVIDER: mock
      DATABASE_URL: sqlite:////data/relay.db
    volumes:
      - ./data:/app/data:ro
      - relay-data:/data
    ports:
      - "8000:8000"
  web:
    build: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE: http://127.0.0.1:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
volumes:
  relay-data:
